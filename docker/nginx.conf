server {
    server_name agentboardroom.flowos.tech;
    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/agentboardroom.flowos.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentboardroom.flowos.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = agentboardroom.flowos.tech) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name agentboardroom.flowos.tech;
    return 404;
}
